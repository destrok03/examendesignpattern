spring.application.name=badwallet-api

# Configuration base de données PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/badwallet_db
spring.datasource.username=postgres
spring.datasource.password=amina2003@
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuration JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Serveur sur port 8080
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# URL du payment-service externe (port 8081)
payment.service.url=http://localhost:8081

# Async config
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
